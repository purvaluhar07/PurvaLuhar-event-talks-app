<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BigQuery Release Notes</title>
  <meta name="description" content="Live BigQuery release notes fetched from Google Cloud — read, browse and tweet about the latest updates." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- Background orbs -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7l10 5 10-5-10-5z" fill="currentColor" opacity="0.9"/>
            <path d="M2 17l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M2 12l10 5 10-5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">BigQuery</span>
          <span class="brand-sub">Release Notes</span>
        </div>
      </div>

      <div class="header-actions">
        <div class="status-badge" id="statusBadge">
          <span class="status-dot"></span>
          <span class="status-text">Ready</span>
        </div>
        <button class="refresh-btn" id="refreshBtn" onclick="loadNotes()" aria-label="Refresh release notes">
          <svg class="refresh-icon" id="refreshIcon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 4v6h6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M23 20v-6h-6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Refresh</span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="main">
    <!-- Stats bar -->
    <div class="stats-bar" id="statsBar" style="display:none;">
      <div class="stat-item">
        <span class="stat-value" id="totalCount">0</span>
        <span class="stat-label">Updates</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="latestDate">—</span>
        <span class="stat-label">Latest</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="sourceTag">Google Cloud</span>
        <span class="stat-label">Source</span>
      </div>
    </div>

    <!-- Loading skeleton -->
    <div id="loadingState" class="loading-container">
      <div class="loading-spinner">
        <div class="spinner-ring"></div>
        <div class="spinner-ring ring-2"></div>
        <div class="spinner-ring ring-3"></div>
      </div>
      <p class="loading-text">Fetching release notes…</p>
    </div>

    <!-- Error state -->
    <div id="errorState" class="error-container" style="display:none;">
      <div class="error-icon">⚠</div>
      <h2 class="error-title">Failed to load release notes</h2>
      <p class="error-msg" id="errorMsg"></p>
      <button class="retry-btn" onclick="loadNotes()">Try Again</button>
    </div>

    <!-- Feed container -->
    <div id="feedContainer" class="feed-container" style="display:none;">
      <div class="entries-grid" id="entriesGrid"></div>
    </div>
  </main>

  <!-- Tweet Modal -->
  <div class="modal-overlay" id="tweetModal" style="display:none;" onclick="closeTweetModal(event)">
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Tweet this update">
      <div class="modal-header">
        <div class="modal-title-group">
          <svg class="x-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.91-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z" fill="currentColor"/>
          </svg>
          <h3 class="modal-title">Share on X (Twitter)</h3>
        </div>
        <button class="modal-close" onclick="closeTweetModal()" aria-label="Close">&times;</button>
      </div>

      <div class="modal-body">
        <p class="modal-label">Edit your tweet:</p>
        <div class="tweet-editor-wrap">
          <textarea id="tweetText" class="tweet-editor" maxlength="280" rows="5"
            placeholder="Compose your tweet…" oninput="updateCharCount()"></textarea>
          <div class="char-counter">
            <span id="charCount">0</span><span>/280</span>
          </div>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="charProgress"></div>
        </div>
        <p class="modal-source-label">Source article:</p>
        <a id="tweetSourceLink" class="modal-source-link" href="#" target="_blank" rel="noopener">—</a>
      </div>

      <div class="modal-footer">
        <button class="cancel-btn" onclick="closeTweetModal()">Cancel</button>
        <button class="tweet-btn" id="tweetSubmitBtn" onclick="postTweet()">
          <svg class="x-logo-sm" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.91-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z" fill="currentColor"/>
          </svg>
          Post to X
        </button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
